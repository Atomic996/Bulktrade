<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BULK Trade Bot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #060810;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Top Bar */
  .topbar {
    background: #0d1117;
    border-bottom: 1px solid #1a2030;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
    flex-shrink: 0;
  }

  .logo {
    font-family: monospace;
    font-size: 14px;
    font-weight: 700;
    color: #00ff88;
    letter-spacing: 1px;
  }

  .topbar-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: monospace;
    transition: all 0.2s;
  }

  .btn-green  { background: #00ff88; color: #000; }
  .btn-red    { background: transparent; color: #ff3355; border: 1px solid #ff3355; }
  .btn-blue   { background: transparent; color: #0088ff; border: 1px solid #0088ff; }
  .btn-green:hover { background: #00cc6e; }
  .btn-red:hover   { background: rgba(255,51,85,0.1); }
  .btn-blue:hover  { background: rgba(0,136,255,0.1); }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: monospace;
    color: #4a5568;
    margin-right: auto;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4a5568;
  }
  .dot.on  { background: #00ff88; box-shadow: 0 0 6px #00ff88; animation: blink 2s infinite; }
  .dot.err { background: #ff3355; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    background: #0d1117;
    border-left: 1px solid #1a2030;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 14px;
    border-bottom: 1px solid #1a2030;
  }

  .section-title {
    font-size: 10px;
    font-family: monospace;
    color: #4a5568;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-family: monospace;
    font-size: 12px;
  }

  .stat-label { color: #4a5568; }
  .stat-val   { color: #e8eaf0; font-weight: 700; }
  .stat-val.pos { color: #00ff88; }
  .stat-val.neg { color: #ff3355; }

  /* Quick trade form */
  .form-group { margin-bottom: 10px; }

  .form-label {
    display: block;
    font-size: 10px;
    font-family: monospace;
    color: #4a5568;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }

  .form-input, .form-select {
    width: 100%;
    background: #060810;
    border: 1px solid #1a2030;
    border-radius: 6px;
    padding: 8px 10px;
    color: #e8eaf0;
    font-family: monospace;
    font-size: 12px;
    outline: none;
  }

  .form-input:focus, .form-select:focus {
    border-color: #00ff88;
  }

  .side-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
  }

  .side-btn {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #1a2030;
    background: transparent;
    font-family: monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .side-btn.buy       { color: #00ff88; }
  .side-btn.sell      { color: #ff3355; }
  .side-btn.buy.act   { background: rgba(0,255,136,.15); border-color: #00ff88; }
  .side-btn.sell.act  { background: rgba(255,51,85,.15);  border-color: #ff3355; }

  .full-btn {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
    font-family: monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .full-btn.green { background: #00ff88; color: #000; }
  .full-btn.green:hover { background: #00cc6e; }
  .full-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Log */
  .log-box {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    font-family: monospace;
    font-size: 10px;
    line-height: 1.7;
    background: #060810;
  }

  .log-box::-webkit-scrollbar { width: 3px; }
  .log-box::-webkit-scrollbar-thumb { background: #1a2030; }

  .le { display: flex; gap: 6px; }
  .lt { color: #2d3748; flex-shrink: 0; }
  .lm.s { color: #00ff88; }
  .lm.e { color: #ff3355; }
  .lm.i { color: #0088ff; }
  .lm.w { color: #ffaa00; }

  /* iFrame */
  .iframe-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #siteFrame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Overlay blocker (shown before login) */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(6,8,16,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    backdrop-filter: blur(4px);
  }

  .overlay-title {
    font-family: monospace;
    font-size: 20px;
    font-weight: 700;
    color: #00ff88;
    margin-bottom: 8px;
  }

  .overlay-sub {
    font-size: 13px;
    color: #4a5568;
    margin-bottom: 24px;
    text-align: center;
    line-height: 1.6;
  }

  .overlay-input {
    width: 320px;
    max-width: 90vw;
    background: #0d1117;
    border: 1px solid #1a2030;
    border-radius: 8px;
    padding: 12px 16px;
    color: #e8eaf0;
    font-family: monospace;
    font-size: 13px;
    outline: none;
    margin-bottom: 12px;
  }

  .overlay-input:focus { border-color: #00ff88; }

  .overlay-btn {
    width: 320px;
    max-width: 90vw;
    padding: 12px;
    background: #00ff88;
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: monospace;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }

  .overlay-btn:hover { background: #00cc6e; }

  .warning-box {
    width: 320px;
    max-width: 90vw;
    background: rgba(255,170,0,0.08);
    border: 1px solid rgba(255,170,0,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 11px;
    color: #ffaa00;
    margin-bottom: 16px;
    text-align: center;
    line-height: 1.6;
  }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Mobile */
  @media (max-width: 600px) {
    .sidebar { width: 240px; }
  }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="logo">⬡ BULK BOT</div>
  <button class="topbar-btn btn-blue" onclick="refreshAccount()">↻ تحديث</button>
  <button class="topbar-btn btn-red" onclick="doLogout()" id="logoutBtn" style="display:none">خروج</button>
  <div class="status">
    <div class="dot" id="sDot"></div>
    <span id="sTxt">غير متصل</span>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- iFrame -->
  <div class="iframe-wrap">
    <iframe id="siteFrame" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>

    <!-- Login Overlay -->
    <div class="overlay" id="loginOverlay">
      <div class="overlay-title">⬡ BULK TRADE BOT</div>
      <div class="overlay-sub">أدخل مفتاحك الخاص لتسجيل الدخول<br>وبدء التداول الآلي</div>
      <div class="warning-box">⚠️ مفتاحك يبقى في متصفحك فقط<br>استخدم محفظة مخصصة للتجربة</div>
      <input class="overlay-input" type="password" id="pkInput" placeholder="Private Key (Base58)..." />
      <button class="overlay-btn" id="loginBtn" onclick="doLogin()">
        تسجيل الدخول
      </button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Account -->
    <div class="sidebar-section">
      <div class="section-title">💰 الحساب</div>
      <div class="stat-row"><span class="stat-label">الرصيد</span><span class="stat-val" id="sBalance">—</span></div>
      <div class="stat-row"><span class="stat-label">المتاح</span><span class="stat-val" id="sAvail">—</span></div>
      <div class="stat-row"><span class="stat-label">PnL</span><span class="stat-val" id="sPnl">—</span></div>
    </div>

    <!-- Quick Trade -->
    <div class="sidebar-section">
      <div class="section-title">🚀 صفقة سريعة</div>

      <div class="side-row">
        <button class="side-btn buy act" id="buyBtn" onclick="setSide('buy')">▲ شراء</button>
        <button class="side-btn sell"    id="sellBtn" onclick="setSide('sell')">▼ بيع</button>
      </div>

      <div class="form-group">
        <label class="form-label">الزوج</label>
        <select class="form-select" id="fSymbol">
          <option value="BTC-USD">BTC/USD</option>
          <option value="ETH-USD">ETH/USD</option>
          <option value="SOL-USD">SOL/USD</option>
          <option value="XRP-USD">XRP/USD</option>
          <option value="GOLD-USD">GOLD/USD</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">الحجم</label>
        <input class="form-input" type="number" id="fSize" value="0.001" step="0.001" min="0.001" />
      </div>

      <div class="form-group">
        <label class="form-label">الرافعة: <span id="fLevVal" style="color:#00ff88">1x</span></label>
        <input type="range" id="fLev" min="1" max="50" value="1" style="width:100%;accent-color:#00ff88"
          oninput="document.getElementById('fLevVal').textContent=this.value+'x'" />
      </div>

      <button class="full-btn green" id="tradeBtn" onclick="doTrade()" disabled>
        فتح الصفقة
      </button>
    </div>

    <!-- Positions -->
    <div class="sidebar-section">
      <div class="section-title">📈 المراكز</div>
      <div id="sPositions" style="font-family:monospace;font-size:11px;color:#4a5568">
        لا توجد صفقات
      </div>
    </div>

    <!-- Log -->
    <div class="log-box" id="logBox"></div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl/1.0.3/nacl-fast.min.js"></script>
<script>
// ══════════════════════════════════════════
// Config
// ══════════════════════════════════════════
const PRIVY_APP_ID = "cmbuls93q01jol20lf0ak0plb";
const PRIVY_CA_ID  = "7a527651-130e-4393-824a-3acdaf3e42d4";
const PRIVY_URL    = "https://auth.privy.io/api/v1";
const BULK_API     = "https://early.bulk.trade/api/proxy/api/v1";
const WS_URL       = "wss://exchange-ws1.bulk.trade";

let G = { sk:null, wallet:null, walletId:null, token:null, side:"buy", ws:null };

// ══════════════════════════════════════════
// Crypto helpers
// ══════════════════════════════════════════
function b58dec(s) {
  const A = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
  let b = [0];
  for (const c of s) {
    let carry = A.indexOf(c);
    if (carry < 0) throw new Error('bad b58');
    for (let i=0;i<b.length;i++){carry+=b[i]*58;b[i]=carry&0xff;carry>>=8;}
    while(carry>0){b.push(carry&0xff);carry>>=8;}
  }
  for (const c of s){if(c==='1')b.push(0);else break;}
  return new Uint8Array(b.reverse());
}

function b58enc(u) {
  const A = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';
  let d=[0];
  for(const b of u){let c=b;for(let i=0;i<d.length;i++){c+=d[i]<<8;d[i]=c%58;c=Math.floor(c/58);}while(c>0){d.push(c%58);c=Math.floor(c/58);}}
  let r='';
  for(const b of u){if(b===0)r+='1';else break;}
  return r+d.reverse().map(x=>A[x]).join('');
}

function b64enc(u){return btoa(String.fromCharCode(...u));}

function loadKP(pk58){
  const raw=b58dec(pk58);
  return nacl.sign.keyPair.fromSeed(raw.slice(0,32));
}

function getAddr(kp){return b58enc(kp.publicKey);}

function signMsg(kp,msg){
  const sig=nacl.sign.detached(new TextEncoder().encode(msg),kp.secretKey);
  return b64enc(sig);
}

function signRaw(kp,bytes){
  return b64enc(nacl.sign.detached(bytes,kp.secretKey));
}

// ══════════════════════════════════════════
// Privy login
// ══════════════════════════════════════════
function ph(extra={}){
  const h={"Content-Type":"application/json","Privy-App-Id":PRIVY_APP_ID,
    "Privy-Ca-Id":PRIVY_CA_ID,"Privy-Client":"react-auth:3.11.0",
    "Origin":"https://early.bulk.trade"};
  if(G.token) h["Authorization"]=`Bearer ${G.token}`;
  return {...h,...extra};
}

function buildMsg(addr,nonce,iat){
  return `early.bulk.trade wants you to sign in with your Solana account:\n${addr}\n\nYou are proving you own ${addr}.\n\nURI: https://early.bulk.trade\nVersion: 1\nChain ID: mainnet\nNonce: ${nonce}\nIssued At: ${iat}\nResources:\n- https://privy.io`;
}

async function privyLogin(kp,addr){
  const r1=await fetch(`${PRIVY_URL}/siws/init`,{
    method:"POST",headers:ph(),credentials:"include",
    body:JSON.stringify({address:addr})
  });
  const d1=await r1.json();
  if(!r1.ok) throw new Error(`init 403: ${JSON.stringify(d1)}`);

  const exp=new Date(d1.expires_at);
  const iat=new Date(exp-3600000).toISOString().replace(/(\.\d{3})\d*Z/,'$1Z');
  const msg=buildMsg(addr,d1.nonce,iat);
  const sig=signMsg(kp,msg);

  const r2=await fetch(`${PRIVY_URL}/siws/authenticate`,{
    method:"POST",headers:ph(),credentials:"include",
    body:JSON.stringify({connectorType:"solana_adapter",message:msg,
      message_type:"plain",mode:"login-or-sign-up",signature:sig,walletClientType:"Phantom"})
  });
  const d2=await r2.json();
  if(!r2.ok) throw new Error(`auth failed: ${JSON.stringify(d2)}`);

  G.token=d2.token||d2.access_token;
  const accs=(d2.user||{}).linked_accounts||[];
  for(const a of accs){
    if(a.type==="wallet"&&a.wallet_client==="privy"){
      G.walletId=a.id||a.wallet_id; break;
    }
  }
  return d2;
}

// ══════════════════════════════════════════
// Bulk API
// ══════════════════════════════════════════
async function bPost(payload){
  const r=await fetch(`${BULK_API}/account`,{
    method:"POST",credentials:"include",
    headers:{"Content-Type":"application/json","Origin":"https://early.bulk.trade",
      ...(G.token?{"Authorization":`Bearer ${G.token}`}:{})},
    body:JSON.stringify(payload)
  });
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function getAcc(){
  const r=await bPost({type:"fullAccount",user:G.wallet});
  return Array.isArray(r)&&r[0]?r[0].fullAccount||{}:{};
}

async function getHist(){
  const r=await bPost({type:"orderHistory",user:G.wallet});
  return Array.isArray(r)?r:[];
}

// ══════════════════════════════════════════
// WebSocket
// ══════════════════════════════════════════
function connectWS(){
  if(G.ws) G.ws.close();
  G.ws=new WebSocket(WS_URL);

  G.ws.onopen=()=>{
    log("WebSocket متصل ✓","s");
    setStatus("on");
    G.ws.send(JSON.stringify({method:"subscribe",id:1,
      subscription:[{type:"account",user:G.wallet}]}));
  };

  G.ws.onmessage=(e)=>{
    try{
      const d=JSON.parse(e.data);
      const inn=d.data||{};
      if(inn.type==="fill"){
        log(`✅ نُفِّذت: ${inn.symbol} @ $${inn.price}`,"s");
        refreshAccount();
      } else if(inn.type==="orderUpdate"){
        log(`📊 ${inn.status} - ${inn.symbol}`,"i");
      } else if(inn.type==="positionUpdate"){
        refreshAccount();
      }
      if(d.id===10001){
        const pl=(d.data||{}).payload||{};
        if(pl.status==="ok"){
          log("✅ الصفقة قُبلت!","s");
        } else {
          log(`الرد: ${JSON.stringify(d).slice(0,100)}`,"w");
        }
        document.getElementById("tradeBtn").disabled=false;
        document.getElementById("tradeBtn").textContent="فتح الصفقة";
      }
    }catch(err){}
  };

  G.ws.onclose=()=>{
    log("WebSocket انقطع","w");
    setStatus("err");
    if(G.wallet) setTimeout(connectWS,3000);
  };

  G.ws.onerror=()=>log("خطأ WebSocket","e");
}

// ══════════════════════════════════════════
// UI actions
// ══════════════════════════════════════════
async function doLogin(){
  const pk=document.getElementById("pkInput").value.trim();
  if(!pk){alert("أدخل المفتاح الخاص");return;}

  const btn=document.getElementById("loginBtn");
  btn.disabled=true;
  btn.innerHTML=`<span class="spinner"></span>جاري تسجيل الدخول...`;

  try{
    const kp=loadKP(pk);
    G.sk=kp;
    G.wallet=getAddr(kp);

    log(`🔑 ${G.wallet.slice(0,8)}...${G.wallet.slice(-6)}`,"i");
    await privyLogin(kp,G.wallet);
    log("✅ تسجيل الدخول نجح!","s");

    // إخفاء overlay
    document.getElementById("loginOverlay").style.display="none";
    document.getElementById("logoutBtn").style.display="block";
    document.getElementById("tradeBtn").disabled=false;

    // تحميل الموقع الأصلي في iframe
    document.getElementById("siteFrame").src="https://early.bulk.trade";
    log("🌐 تحميل early.bulk.trade...","i");

    await refreshAccount();
    connectWS();

  }catch(e){
    log(`❌ ${e.message}`,"e");
    btn.disabled=false;
    btn.textContent="تسجيل الدخول";
  }
}

async function refreshAccount(){
  try{
    const acc=await getAcc();
    const m=acc.margin||{};
    const pnl=m.unrealizedPnl||0;

    document.getElementById("sBalance").textContent=`$${(m.totalBalance||0).toFixed(2)}`;
    document.getElementById("sAvail").textContent=`$${(m.availableBalance||0).toFixed(2)}`;

    const pEl=document.getElementById("sPnl");
    pEl.textContent=`${pnl>=0?'+':''}$${pnl.toFixed(2)}`;
    pEl.className=`stat-val ${pnl>0?'pos':pnl<0?'neg':''}`;

    const pos=acc.positions||[];
    const pDiv=document.getElementById("sPositions");
    if(!pos.length){
      pDiv.textContent="لا توجد صفقات";
    } else {
      pDiv.innerHTML=pos.map(p=>{
        const up=p.unrealizedPnl||0;
        const isL=p.size>0;
        return `<div style="margin-bottom:8px;padding:6px;background:#060810;border-radius:6px;border:1px solid #1a2030">
          <div style="display:flex;justify-content:space-between">
            <span style="color:#e8eaf0;font-weight:700">${p.symbol}</span>
            <span style="color:${isL?'#00ff88':'#ff3355'};font-size:10px">${isL?'LONG':'SHORT'}</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:4px;color:#4a5568">
            <span>${Math.abs(p.size).toFixed(4)}</span>
            <span style="color:${up>=0?'#00ff88':'#ff3355'}">${up>=0?'+':''}$${up.toFixed(2)}</span>
          </div>
        </div>`;
      }).join('');
    }
  }catch(e){
    log(`⚠️ ${e.message}`,"w");
  }
}

async function doTrade(){
  if(!G.ws||G.ws.readyState!==1){log("WebSocket غير متصل","e");return;}

  const symbol=document.getElementById("fSymbol").value;
  const size=document.getElementById("fSize").value;
  const nonce=Date.now();
  const isB=G.side==="buy";

  const btn=document.getElementById("tradeBtn");
  btn.disabled=true;
  btn.innerHTML=`<span class="spinner"></span>إرسال...`;

  log(`🚀 ${G.side.toUpperCase()} ${symbol} | ${size}`,"i");

  const action={b:isB,c:symbol,r:false,sz:size};
  const pLoad={account:G.wallet,actions:[{m:action}],nonce,type:"action"};
  const pBytes=new TextEncoder().encode(JSON.stringify(pLoad));
  const sig=signRaw(G.sk,pBytes);

  G.ws.send(JSON.stringify({
    method:"post",id:10001,
    request:{type:"action",payload:{
      account:G.wallet,actions:[{m:action}],
      nonce,signature:sig,signer:G.wallet,type:"action"
    }}
  }));
}

function setSide(s){
  G.side=s;
  document.getElementById("buyBtn").classList.toggle("act",s==="buy");
  document.getElementById("sellBtn").classList.toggle("act",s==="sell");
}

function doLogout(){
  if(G.ws) G.ws.close();
  G={sk:null,wallet:null,walletId:null,token:null,side:"buy",ws:null};
  document.getElementById("loginOverlay").style.display="flex";
  document.getElementById("logoutBtn").style.display="none";
  document.getElementById("tradeBtn").disabled=true;
  document.getElementById("pkInput").value="";
  document.getElementById("loginBtn").disabled=false;
  document.getElementById("loginBtn").textContent="تسجيل الدخول";
  document.getElementById("siteFrame").src="about:blank";
  setStatus("off");
}

function setStatus(s){
  const d=document.getElementById("sDot");
  const t=document.getElementById("sTxt");
  d.className="dot";
  if(s==="on"){d.classList.add("on");t.textContent="متصل";}
  else if(s==="err"){d.classList.add("err");t.textContent="خطأ";}
  else t.textContent="غير متصل";
}

function log(msg,type="i"){
  const c=document.getElementById("logBox");
  const now=new Date().toLocaleTimeString("ar",{hour12:false});
  const el=document.createElement("div");
  el.className="le";
  el.innerHTML=`<span class="lt">[${now}]</span><span class="lm ${type}">${msg}</span>`;
  c.appendChild(el);
  c.scrollTop=c.scrollHeight;
}
</script>
